<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Housing Rent — Coefficient Plot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f4ef;
    --ink: #1a1612;
    --ink-light: #7a7068;
    --accent: #c85a2a;
    --accent-muted: rgba(200, 90, 42, 0.15);
    --zero-line: #b8b0a4;
    --range-fill: rgba(200, 90, 42, 0.18);
    --range-stroke: #c85a2a;
    --dot: #c85a2a;
    --grid: rgba(26,22,18,0.07);
    --tooltip-bg: #1a1612;
    --tooltip-text: #f7f4ef;
  }

  body {
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: var(--ink);
    margin: 0;
    padding: 0;
  }

  .card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 24px 8px 16px;
    max-width: 720px;
    width: 100%;
    box-shadow: none;
  }

  .header { margin-bottom: 36px; }

  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 3vw, 26px);
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--ink-light);
    font-weight: 300;
  }

  .chart-wrap {
    position: relative;
    margin-top: 8px;
  }

  svg { overflow: visible; display: block; width: 100%; }

  .axis-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 400;
    fill: var(--ink);
  }

  .x-tick {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    fill: var(--ink-light);
  }

  .zero-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    fill: var(--accent);
    font-weight: 500;
  }

  .grid-line { stroke: var(--grid); stroke-width: 1; }
  .zero-line { stroke: var(--zero-line); stroke-width: 1.5; stroke-dasharray: 4 3; }

  .range-bar {
    fill: var(--range-fill);
    rx: 3;
    transition: fill 0.2s;
    cursor: pointer;
  }
  .range-bar:hover { fill: rgba(200, 90, 42, 0.3); }

  .ci-line {
    stroke: var(--range-stroke);
    stroke-width: 2;
    stroke-linecap: round;
    transition: stroke-width 0.2s;
  }

  .ci-cap {
    stroke: var(--range-stroke);
    stroke-width: 2;
    stroke-linecap: round;
  }

  .est-dot {
    fill: #fff;
    stroke: var(--dot);
    stroke-width: 2.5;
    cursor: pointer;
    transition: r 0.2s, fill 0.2s;
  }
  .est-dot:hover, .est-dot.active { fill: var(--dot); r: 7; }

  .row-hover-bg {
    fill: transparent;
    cursor: pointer;
    transition: fill 0.15s;
  }
  .row-hover-bg:hover { fill: rgba(200,90,42,0.04); }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: var(--tooltip-bg);
    color: var(--tooltip-text);
    padding: 10px 14px;
    border-radius: 3px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 220px;
    line-height: 1.6;
    z-index: 100;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip strong { font-weight: 500; display: block; margin-bottom: 2px; }
  #tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; }
  #tooltip .tt-label { color: rgba(247,244,239,0.6); }
  #tooltip .tt-val { font-weight: 500; }

  .footer {
    margin-top: 28px;
    padding-top: 16px;
    border-top: 1px solid rgba(26,22,18,0.08);
    font-size: 11px;
    color: var(--ink-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer a { color: var(--accent); text-decoration: none; }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 18px;
    font-size: 11px;
    color: var(--ink-light);
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--accent);
    flex-shrink: 0;
  }
  .legend-range {
    width: 24px; height: 8px;
    background: var(--range-fill);
    border: 1px solid var(--range-stroke);
    border-radius: 2px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Estimated Effect of Housing<br>Characteristics on Monthly Rent</h1>
    <p class="subtitle">Coefficient estimates with 95% confidence intervals — hover each row for details</p>
  </div>

  <div class="chart-wrap">
    <svg id="chart"></svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot"></div> Point estimate</div>
    <div class="legend-item"><div class="legend-range"></div> 95% confidence interval</div>
  </div>


</div>

<div id="tooltip"></div>

<script>
const data = [
  { label: 'Bathrooms',                      estimate: 1542.8, lo: 1255.3, hi: 1830.3 },
  { label: 'Bedrooms',                       estimate: 1668.7, lo: 1449.9, hi: 1887.5 },
  { label: 'Square Footage (per 100 sq ft)', estimate: 18.0,   lo: -41.0,  hi: 77.1   },
  { label: 'Bike Travel Time (minutes)',     estimate: 6.6,    lo: -80.1,  hi: 93.3   },
];

function fmt(v) {
  const abs = Math.abs(v);
  const s = abs >= 1000 ? abs.toLocaleString('en-US', {maximumFractionDigits: 0}) : abs.toFixed(1);
  return (v < 0 ? '−' : '+') + '$' + s;
}
function fmtDollar(v) {
  const abs = Math.abs(v);
  const s = abs >= 1000 ? abs.toLocaleString('en-US', {maximumFractionDigits: 0}) : abs.toFixed(1);
  return (v < 0 ? '−$' : '$') + s;
}

function draw() {
  const svg = document.getElementById('chart');
  const cardWidth = svg.parentElement.getBoundingClientRect().width;

  const margin = { top: 10, right: 30, bottom: 44, left: 230 };
  const rowH = 56;
  const n = data.length;
  const height = rowH * n;
  const width = cardWidth - margin.left - margin.right;

  svg.setAttribute('viewBox', `0 0 ${cardWidth} ${height + margin.top + margin.bottom}`);
  svg.setAttribute('height', height + margin.top + margin.bottom);
  svg.innerHTML = '';

  // Scale
  const allVals = data.flatMap(d => [d.lo, d.hi]);
  const domMin = Math.min(...allVals);
  const domMax = Math.max(...allVals);
  const pad = (domMax - domMin) * 0.12;
  const scaleMin = domMin - pad;
  const scaleMax = domMax + pad;

  function xScale(v) {
    return margin.left + ((v - scaleMin) / (scaleMax - scaleMin)) * width;
  }

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svg.appendChild(g);

  // Grid lines & x-axis ticks
  const ticks = [-200, 0, 200, 400, 600, 800, 1000, 1200, 1400, 1600, 1800, 2000];
  ticks.forEach(t => {
    if (t < scaleMin || t > scaleMax) return;
    const x = xScale(t);

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x); line.setAttribute('x2', x);
    line.setAttribute('y1', margin.top); line.setAttribute('y2', margin.top + height);
    line.setAttribute('class', t === 0 ? 'zero-line' : 'grid-line');
    g.appendChild(line);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', x);
    label.setAttribute('y', margin.top + height + 18);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('class', t === 0 ? 'zero-label' : 'x-tick');
    label.textContent = t === 0 ? '0' : (t >= 1000 || t <= -1000 ? (t/1000).toFixed(1)+'k' : t);
    g.appendChild(label);
  });

  // X axis label
  const axisLbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  axisLbl.setAttribute('x', margin.left + width / 2);
  axisLbl.setAttribute('y', margin.top + height + 40);
  axisLbl.setAttribute('text-anchor', 'middle');
  axisLbl.setAttribute('class', 'x-tick');
  axisLbl.style.fill = '#7a7068';
  axisLbl.textContent = 'Change in Monthly Rent ($)';
  g.appendChild(axisLbl);

  const tooltip = document.getElementById('tooltip');

  data.forEach((d, i) => {
    const cy = margin.top + rowH * i + rowH / 2;
    const x1 = xScale(d.lo);
    const x2 = xScale(d.hi);
    const xEst = xScale(d.estimate);

    // Hover background
    const hoverBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    hoverBg.setAttribute('x', 0);
    hoverBg.setAttribute('y', margin.top + rowH * i + 4);
    hoverBg.setAttribute('width', cardWidth);
    hoverBg.setAttribute('height', rowH - 8);
    hoverBg.setAttribute('class', 'row-hover-bg');
    g.appendChild(hoverBg);

    // Y label
    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('x', margin.left - 16);
    lbl.setAttribute('y', cy + 4);
    lbl.setAttribute('text-anchor', 'end');
    lbl.setAttribute('class', 'axis-label');
    lbl.textContent = d.label;
    g.appendChild(lbl);

    // CI range bar
    const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bar.setAttribute('x', x1);
    bar.setAttribute('y', cy - 10);
    bar.setAttribute('width', x2 - x1);
    bar.setAttribute('height', 20);
    bar.setAttribute('rx', 3);
    bar.setAttribute('class', 'range-bar');
    g.appendChild(bar);

    // CI line
    const ciLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ciLine.setAttribute('x1', x1); ciLine.setAttribute('x2', x2);
    ciLine.setAttribute('y1', cy); ciLine.setAttribute('y2', cy);
    ciLine.setAttribute('class', 'ci-line');
    g.appendChild(ciLine);

    // CI caps
    [[x1],[x2]].forEach(([x]) => {
      const cap = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      cap.setAttribute('x1', x); cap.setAttribute('x2', x);
      cap.setAttribute('y1', cy - 7); cap.setAttribute('y2', cy + 7);
      cap.setAttribute('class', 'ci-cap');
      g.appendChild(cap);
    });

    // Point estimate dot
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', xEst);
    dot.setAttribute('cy', cy);
    dot.setAttribute('r', 5.5);
    dot.setAttribute('class', 'est-dot');
    g.appendChild(dot);

    // Tooltip interactions
    function showTip(e) {
      dot.classList.add('active');
      tooltip.innerHTML = `
        <strong>${d.label}</strong>
        <div class="tt-row"><span class="tt-label">Estimate</span><span class="tt-val">${fmtDollar(d.estimate)}</span></div>
        <div class="tt-row"><span class="tt-label">95% CI</span><span class="tt-val">${fmtDollar(d.lo)} to ${fmtDollar(d.hi)}</span></div>
        <div class="tt-row"><span class="tt-label">Significant?</span><span class="tt-val">${(d.lo > 0 || d.hi < 0) ? 'Yes (p < 0.05)' : 'No'}</span></div>
      `;
      tooltip.classList.add('visible');
      moveTip(e);
    }
    function moveTip(e) {
      const offset = 14;
      let tx = e.clientX + offset;
      let ty = e.clientY - 10;
      if (tx + 240 > window.innerWidth) tx = e.clientX - 240;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
    }
    function hideTip() {
      dot.classList.remove('active');
      tooltip.classList.remove('visible');
    }

    [hoverBg, bar, dot, ciLine].forEach(el => {
      el.addEventListener('mouseenter', showTip);
      el.addEventListener('mousemove', moveTip);
      el.addEventListener('mouseleave', hideTip);
    });
  });
}

draw();
window.addEventListener('resize', draw);
</script>
</body>
</html>
